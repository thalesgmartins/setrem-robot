# --- Persistência ---
# Guarda mensagens retain e filas de QoS>0 entre reinícios.
persistence true
persistence_location /mosquitto/data/

# --- Logs ---
# stdout para aparecer em `docker compose logs -f`.
log_dest stdout
log_type all
log_timestamp true

# --- Listener local ---
# No Mosquitto 2.x NÃO há listener nem anonymous por padrão: tudo explícito.
listener 1883
# Tráfego só trafega em loopback (ver port mapping no compose), então
# liberar anônimo aqui é aceitável: são os processos do próprio robô.
# Para endurecer depois, troque por password_file também aqui.
allow_anonymous true

# --- Inclui as configs adicionais (a bridge fica isolada num arquivo próprio,
#     que NÃO vai pro git porque contém a senha do broker remoto) ---
include_dir /mosquitto/config/conf.d