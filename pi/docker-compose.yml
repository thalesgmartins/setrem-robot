# Broker MQTT LOCAL
# Escuta APENAS em loopback (127.0.0.1)
# A replicação de telemetria para a nuvem é feita pela bridge configurada
# em ./mosquitto/config/conf.d/bridge.conf

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto-local
    restart: unless-stopped
    ports:
      # Mapeado SÓ no loopback do host. Nada de fora do Pi alcança o broker.
      - "127.0.0.1:1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/config/conf.d:/mosquitto/config/conf.d:ro
      - ./mosquitto/certs:/mosquitto/certs:ro
      - mosquitto_local_data:/mosquitto/data
    healthcheck:
      # Considera saudável se o broker responde a um publish local.
      test: ["CMD", "mosquitto_pub", "-h", "127.0.0.1", "-t", "healthcheck", "-m", "ping", "-q", "0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mosquitto_local_data: